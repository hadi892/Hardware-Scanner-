name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 'current'

      - name: Generate Gradle Wrapper if missing
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --no-daemon
          fi

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Prepare Debug Keystore and Environment
        run: |
          if [ ! -f .env ]; then
            touch .env
          fi
          if [ -f debug.keystore.base64 ]; then
            base64 --decode debug.keystore.base64 > debug.keystore
          fi

      - name: Run Local Unit & Robolectric Tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/**/*.apk
          retention-days: 14
